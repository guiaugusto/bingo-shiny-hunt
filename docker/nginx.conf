server {
    listen 80;
    server_name _;

    # The build is base-pathed at /bingo-shiny-hunt/ to match GitHub Pages.
    location = / {
        return 302 /bingo-shiny-hunt/;
    }

    location /bingo-shiny-hunt/ {
        alias /usr/share/nginx/html/bingo-shiny-hunt/;
        try_files $uri $uri/ /bingo-shiny-hunt/index.html;
    }
}
